<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server starting</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  font-family:Arial, sans-serif;
}

h1{
  margin-bottom:30px;
  font-size:32px;
}

.loader{
  width:60px;
  height:60px;
  border:6px solid #333;
  border-top:6px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<h1>The server starts</h1>
<div class="loader"></div>

<script>
function checkServer(){
  fetch("https://www.finder-niche.com/")
    .then(() => {
      window.location.href = "https://www.finder-niche.com/";
    })
    .catch(() => {
      setTimeout(checkServer, 3000);
    });
}

checkServer();
</script>

</body>
</html>
