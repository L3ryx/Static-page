<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement...</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

.loader{
  border:6px solid #333;
  border-top:6px solid #3b82f6;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<h1>Le serveur démarre...</h1>
<div class="loader"></div>

<script>
function checkServer(){
  fetch("https://www.finder-niche.com/")
  .then(() => {
    window.location.href = "https://www.finder-niche.com/";
  })
  .catch(() => {
    setTimeout(checkServer, 3000);
  });
}

checkServer();
</script>

</body>
</html>
